{% extends "base.html" %}

{% block title %}Analytics — Spendly{% endblock %}

{% block content %}
<div class="analytics-page">
    <div class="cs-wrapper">
        <div class="cs-deco cs-deco--tr" aria-hidden="true"></div>
        <div class="cs-deco cs-deco--bl" aria-hidden="true"></div>

        <div class="cs-card">
            <div class="cs-icon-box" aria-hidden="true">
                <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="22" cy="22" r="17" stroke="white" stroke-width="2.5"/>
                    <path d="M22 13v9l6 3.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <span class="cs-badge">COMING SOON</span>

            <h1 class="cs-title">Advanced Analytics</h1>

            <p class="cs-body">
                We're working on powerful insights and visualizations<br>
                to help you understand your spending patterns better.
            </p>

            <div class="cs-dots" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <p class="cs-tagline">We're crafting something special</p>
        </div>
    </div>
</div>
{% endblock %}
